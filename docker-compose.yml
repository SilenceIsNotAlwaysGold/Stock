version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: quant-v8-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PG_HOST: postgres
      MONGO_HOST: mongodb
      REDIS_HOST: redis
      TZ: Asia/Shanghai
      T1_STRATEGY_TOP_N: "5"
      T1_MARKET_SAFE_THRESHOLD: "8.0"
      T1_MIN_TOTAL_SCORE: "50.0"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - quant-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: quant-v8-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - quant-network
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: quant-v8-postgres
    environment:
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant123
      POSTGRES_DB: quant_v8
      TZ: Asia/Shanghai
    ports:
      - "25432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - quant-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d quant_v8"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: quant-v8-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: quant123
      MONGO_INITDB_DATABASE: quant_v8
      TZ: Asia/Shanghai
    ports:
      - "27019:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - quant-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: quant-v8-redis
    command: redis-server --appendonly yes --requirepass quant123
    ports:
      - "26379:6379"
    volumes:
      - redis_data:/data
    networks:
      - quant-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "quant123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pg_data:
  mongo_data:
  redis_data:

networks:
  quant-network:
    driver: bridge
